# OpenSpec Configuration for thewestrep/login-2
# Re-initialized by SDD Init (HYBRID mode) on 2026-04-29

schema: spec-driven

context: |
  Tech stack: Next.js 16.2.1 (App Router, breaking changes), React 19.2.4, TypeScript 5 (strict), TailwindCSS 4, Drizzle ORM + Neon PostgreSQL, NextAuth 4, Zod 4, MercadoPago SDK, Resend, Three.js/ShaderGradient
  Architecture: Clean Architecture in lib/ (domain-separated modules), App Router with Server Components, repository pattern, route handlers for API, security middleware (rate limiting, CSRF)
  Testing: Node.js native test runner (node:test/assert), Playwright for E2E, unit tests in tests/unit/
  Style: ESLint (next/core-web-vitals + typescript), TypeScript strict mode, path aliases @/*

strict_tdd: true

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/packages (lib/, app/, components/)
    - Document security implications for auth/payment changes

  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
    - Include error cases and edge scenarios

  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
    - Map to existing repository patterns

  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
    - Mark test files that need updating

  apply:
    - Follow existing code patterns in lib/ (Clean Architecture)
    - Use Drizzle ORM patterns from existing repositories
    - Load relevant coding skills for Next.js/React
    - Respect security middleware patterns
    - This is NOT the Next.js you know — read node_modules/next/dist/docs/ before writing code

  verify:
    - Run node --test for unit tests
    - Run Playwright for E2E tests
    - Compare implementation against every spec scenario
    - Check type safety with tsc --noEmit

  archive:
    - Warn before merging destructive deltas (large removals)

testing:
  strict_tdd_mode: true
  test_command: "node --import ./tests/node-test-register.mjs --test"
  detected: 2026-04-29

  test_runner:
    command: "node --import ./tests/node-test-register.mjs --test \"tests/unit/**/*.test.ts\""
    framework: Node.js Native Test Runner (node:test + node:assert)

  layers:
    unit:
      available: true
      tool: "node:test + node:assert"
      location: tests/unit/
      command: "npm run test:unit"
    integration:
      available: false
      tool: null
    e2e:
      available: true
      tool: Playwright 1.58+
      location: tests/e2e/
      command: "npm run e2e"

  coverage:
    available: true
    command: "node --test --experimental-test-coverage"

  quality:
    linter:
      available: true
      tool: ESLint (next/core-web-vitals + typescript)
      command: "npm run lint"
    type_checker:
      available: true
      tool: TypeScript (strict mode)
      command: "npm run typecheck"
    formatter:
      available: false
      tool: null