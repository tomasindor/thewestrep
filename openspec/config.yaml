rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/packages (lib/, app/, components/)
    - Document security implications for auth/payment changes

  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
    - Include error cases and edge scenarios

  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
    - Map to existing repository patterns

  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
    - Mark test files that need updating

  apply:
    - Follow existing code patterns in lib/ (Clean Architecture)
    - Use Drizzle ORM patterns from existing repositories
    - Load relevant coding skills for Next.js/React
    - Respect security middleware patterns

  verify:
    - Run node --test for unit tests
    - Run Playwright for E2E tests
    - Compare implementation against every spec scenario
    - Check type safety with tsc --noEmit

